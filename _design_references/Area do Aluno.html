<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will Treinos PRO — Área do Aluno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#2a2a3e;font-family:'Lexend',sans-serif;overflow:auto}
    #root{height:100%}

    /* Scrollbars */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#333;border-radius:4px}

    @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(234,179,8,.15)}50%{box-shadow:0 0 40px rgba(234,179,8,.35)}}

    .shimmer-gold{
      background:linear-gradient(90deg,#EAB308 0%,#F97316 25%,#fff8e1 50%,#F97316 75%,#EAB308 100%);
      background-size:200% auto;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      animation:shimmer 3s linear infinite
    }
    .live-dot{animation:pulse 1.2s ease-in-out infinite}
    .gold-glow{animation:glow 3s ease-in-out infinite}

    /* Bottom nav */
    .bottom-nav{
      position:absolute;bottom:10px;left:8px;right:8px;
      background:rgba(10,10,10,.96);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      display:flex;align-items:center;justify-content:space-around;
      padding:8px 4px;z-index:10
    }
    .nav-item{
      display:flex;flex-direction:column;align-items:center;gap:2px;
      padding:4px 8px;border-radius:10px;cursor:pointer;
      transition:all .2s;min-width:44px;min-height:44px;justify-content:center
    }
    .nav-item.active .nav-icon{color:#EAB308}
    .nav-item.active .nav-dot{display:block}
    .nav-dot{display:none;width:4px;height:4px;border-radius:50%;background:#EAB308;margin:0 auto}
    .nav-icon{width:20px;height:20px;color:#52525b;transition:color .2s}
    .nav-label{font-size:9px;font-weight:700;color:#52525b;text-transform:uppercase;letter-spacing:.06em}
    .nav-item.active .nav-label{color:#EAB308}

    /* Canvas wrapper */
    .canvas-root{
      width:100%;min-height:100vh;
      display:flex;flex-direction:column;
      background:#2a2a3e;
    }
    .canvas-toolbar{
      flex-shrink:0;height:44px;
      background:rgba(20,20,36,.98);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,.1);
      display:flex;align-items:center;padding:0 16px;gap:12px
    }
    .toolbar-title{
      font-family:'Space Grotesk',sans-serif;
      font-size:11px;font-weight:700;
      text-transform:uppercase;letter-spacing:.15em;
      color:rgba(255,255,255,.35)
    }
    .toolbar-badge{
      font-family:'Space Grotesk',sans-serif;
      font-size:9px;font-weight:700;letter-spacing:.1em;
      text-transform:uppercase;
      background:rgba(234,179,8,.12);
      border:1px solid rgba(234,179,8,.25);
      color:#EAB308;padding:2px 8px;border-radius:20px
    }
    .canvas-scroll{
      flex:1;
      padding:32px 48px 80px;
      background:#2a2a3e;
      overflow:visible;
    }
    .canvas-section{margin-bottom:56px}
    .section-label{
      font-family:'Space Grotesk',sans-serif;
      font-size:10px;font-weight:700;
      text-transform:uppercase;letter-spacing:.2em;
      color:rgba(255,255,255,.25);
      margin-bottom:20px;
      display:flex;align-items:center;gap:10px
    }
    .section-label::after{
      content:'';flex:1;height:1px;
      background:linear-gradient(to right,rgba(255,255,255,.08),transparent)
    }
    .frames-row{display:flex;gap:48px;align-items:flex-start;padding-bottom:32px}
    .frame-col{display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0}
    .frame-tag{
      font-family:'Space Grotesk',sans-serif;
      font-size:10px;font-weight:700;letter-spacing:.12em;
      text-transform:uppercase;color:rgba(255,255,255,.3)
    }
    /* iOS Device shell */
    .device{
      width:375px;
      border-radius:44px;overflow:hidden;
      background:#050505;
      box-shadow:0 40px 100px rgba(0,0,0,.9), 0 0 0 8px #000, 0 0 0 9px rgba(255,255,255,.08);
      position:relative;flex-shrink:0;
      transform-origin: top center;
    }
    .device.v1{
      box-shadow:0 40px 100px rgba(0,0,0,.9), 0 0 0 8px #000, 0 0 0 10px rgba(234,179,8,.5), 0 0 40px rgba(234,179,8,.2);
    }
    .device.v2{
      box-shadow:0 40px 100px rgba(0,0,0,.9), 0 0 0 8px #000, 0 0 0 10px rgba(96,165,250,.5), 0 0 40px rgba(96,165,250,.2);
    }
    .device-island{
      position:absolute;top:10px;left:50%;transform:translateX(-50%);
      width:120px;height:34px;border-radius:20px;
      background:#000;z-index:20
    }
    .device-statusbar{
      height:50px;display:flex;align-items:flex-end;
      padding:0 20px 8px;justify-content:space-between;
      position:relative;z-index:10;flex-shrink:0
    }
    .status-time{
      font-family:-apple-system,system-ui;font-weight:600;font-size:15px;color:#fff
    }
    .status-icons{display:flex;align-items:center;gap:5px}
    .device-content{
      overflow-y:auto;overflow-x:hidden;
      position:relative
    }
    .device-home{
      position:absolute;bottom:0;left:0;right:0;height:32px;
      display:flex;align-items:flex-end;justify-content:center;
      padding-bottom:8px;z-index:20;pointer-events:none
    }
    .home-indicator{width:120px;height:4px;border-radius:4px;background:rgba(255,255,255,.3)}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const GOLD = '#EAB308';
const ORANGE = '#F97316';
const GREEN = '#22C55E';
const RED = '#EF4444';
const BLUE = '#60A5FA';
const PURPLE = '#A78BFA';
const BG = '#0c0c18';
const BG2 = '#14141f';

// ─── ICONS (inline SVG) ───────────────────────────────────────────────────

const Icons = {

  star: 'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z',
  trophy: ['M6 9H2V3h4','M18 9h4V3h-4','M6 3h12v10a6 6 0 01-12 0V3z','M9 22v-3','M15 22v-3','M7 22h10'],
  check: 'M20 6L9 17l-5-5',

  play: 'M5 3l14 9-14 9V3z',

  logout: ['M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4','M16 17l5-5-5-5','M21 12H9'],

  shield: 'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',
  phone: 'M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.06 1.18 2 2 0 012.06.02h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z',

  x: 'M18 6L6 18M6 6l12 12',

// ─── DEVICE SHELL ─────────────────────────────────────────────────────────
function Device({ height=812, children, tag, variant='v1' }) {
  const isV1 = variant === 'v1';
  return (
    <div className="frame-col">
      <span className="frame-tag" style={{ color: isV1 ? 'rgba(234,179,8,.55)' : 'rgba(96,165,250,.55)' }}>{tag}</span>
      <div className={`device ${variant}`} style={{ height }}>
        <div className="device-island" />
        {/* Status bar */}
        <div className="device-statusbar">
          <span className="status-time">9:41</span>
          <div className="status-icons">
            <svg width="17" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx=".7" fill="#fff"/><rect x="4.8" y="5" width="3.2" height="7" rx=".7" fill="#fff"/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx=".7" fill="#fff"/><rect x="14.4" y="0" width="3.2" height="12" rx=".7" fill="#fff"/></svg>

            <svg width="25" height="12" viewBox="0 0 27 13"><rect x=".5" y=".5" width="23" height="12" rx="3.5" stroke="rgba(255,255,255,.35)" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill="#fff"/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill="rgba(255,255,255,.4)"/></svg>

        <div className="device-content" style={{ height: height - 50 - 32, overflowY: 'auto', overflowX: 'hidden', position: 'relative', display: 'block' }}>

      </div>
    </div>

}

// ─── BOTTOM NAVIGATION ────────────────────────────────────────────────────
function BottomNav({ active = 'home' }) {
  const tabs = [
    { id:'home', label:'Home', icon:'home' },
    { id:'treinos', label:'Treinos', icon:'dumbbell' },
    { id:'agenda', label:'Agenda', icon:'calendar' },
    { id:'feed', label:'Feed', icon:'image' },
    { id:'perfil', label:'Perfil', icon:'user' },
  ];
  return (
    <div className="bottom-nav">
      {tabs.map(t => (
        <div key={t.id} className={`nav-item ${active===t.id?'active':''}`}>
          <Icon d={Icons[t.icon]} size={20} color={active===t.id ? GOLD : '#52525b'} />
          <div className="nav-dot" />
        </div>
      ))}
    </div>
  );
}

// ─── MINI BAR ─────────────────────────────────────────────────────────────
function MiniBar({ label, value, color, pct }) {
  return (
    <div style={{ marginBottom: 6 }}>
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom: 4 }}>
        <span style={{ fontSize:10, color:'#71717a', fontWeight:600, textTransform:'uppercase', letterSpacing:'.08em' }}>{label}</span>
        <span style={{ fontSize:11, color, fontWeight:700 }}>{value}</span>
      </div>
      <div style={{ height:4, background:'#18181b', borderRadius:4, overflow:'hidden' }}>
        <div style={{ width:`${pct}%`, height:'100%', background:color, borderRadius:4, transition:'width .6s' }} />
      </div>
    </div>
  );
}

// ─── STAT PILL ────────────────────────────────────────────────────────────
function StatPill({ label, value, color='#EAB308', icon }) {
  return (
    <div style={{
      background:'rgba(255,255,255,.03)', border:'1px solid rgba(255,255,255,.07)',
      borderRadius:14, padding:'10px 12px', textAlign:'center', flex:1,
    }}>
      {icon && <Icon d={Icons[icon]} size={14} color={color} style={{ marginBottom:4, display:'block', margin:'0 auto 4px' }} />}
      <div style={{ fontSize:16, fontWeight:800, color, letterSpacing:'-.02em' }}>{value}</div>
      <div style={{ fontSize:9, color:'#52525b', fontWeight:700, textTransform:'uppercase', letterSpacing:'.08em', marginTop:2 }}>{label}</div>
    </div>
  );
}

// ─── SECTION HEADER ───────────────────────────────────────────────────────
function SectionHeader({ title, action }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
      <span style={{ fontSize:11, fontWeight:800, textTransform:'uppercase', letterSpacing:'.14em', color:'rgba(255,255,255,.7)' }}>{title}</span>
      {action && <span style={{ fontSize:10, color:GOLD, fontWeight:700, cursor:'pointer' }}>{action}</span>}
    </div>
  );
}

// ─── GOLD DIVIDER ─────────────────────────────────────────────────────────
function GoldLine() {
  return <div style={{ height:1, background:'linear-gradient(to right,transparent,rgba(234,179,8,.25),transparent)', margin:'12px 0' }} />;
}

// ════════════════════════════════════════════════════════════
// TELA 1 — HOME  V1: FOCUS
// ════════════════════════════════════════════════════════════

        <span style={{ fontSize:10, color:'rgba(255,255,255,.2)', fontFamily:"'Space Grotesk',sans-serif" }}>V1 Focus · V2 Kinetic</span>
      </div>

      {/* Canvas scroll */}
      <div className="canvas-scroll">
        {/* Legend row */}
        <div style={{ display:'flex', gap:32, marginBottom:32, paddingLeft:4 }}>
          {['V1 — Focus (hierarquia clara, info progressiva)', 'V2 — Kinetic (hero imersivo, dados como scorecard esportivo)'].map((l,i) => (
            <div key={i} style={{ display:'flex', gap:8, alignItems:'center' }}>
              <div style={{ width:24, height:3, borderRadius:2, background: i===0 ? GOLD : BLUE }} />
              <span style={{ fontSize:11, color:'rgba(255,255,255,.35)', fontFamily:"'Space Grotesk',sans-serif" }}>{l}</span>
            </div>
          ))}
        </div>

        {SECTIONS.map(section => (
          <div className="canvas-section" key={section.id}>
            <div className="section-label">{section.label}</div>
            <div className="frames-row">
              <Device height={section.height} tag="V1 — Focus" variant="v1">
                <section.V1 />
              </Device>
              <Device height={section.height} tag="V2 — Kinetic" variant="v2">
                <section.V2 />
              </Device>
            </div>
          </div>
        ))}
      </div>

      {/* Tweaks Panel */}
      <TweaksPanel>
        <TweakSection label="Variações" />
        <TweakRadio label="Cor de Destaque" value={tweaks.accentColor}
          options={['gold','blue','purple']}
          onChange={(v) => setTweak('accentColor', v)} />
        <TweakSection label="Cards" />
        <TweakRadio label="Estilo" value={tweaks.cardStyle}
          options={['dark','glass']}
          onChange={(v) => setTweak('cardStyle', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

name: CI — Typecheck + Build + E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
  NEXT_PUBLIC_APP_URL: https://will-treinos-pro.vercel.app
  NEXT_PUBLIC_POSTHOG_HOST: https://us.posthog.com

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.2 }
      - uses: actions/setup-node@v4
        with: { node-version: "20.x", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.2 }
      - uses: actions/setup-node@v4
        with: { node-version: "20.x", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          NEXT_PUBLIC_DEV_ROOT_EMAILS: ${{ secrets.NEXT_PUBLIC_DEV_ROOT_EMAILS }}
          NEXT_PUBLIC_APP_URL: https://will-treinos-pro.vercel.app
          NEXT_PUBLIC_POSTHOG_HOST: https://us.posthog.com

  playwright:
    name: E2E (chromium)
    runs-on: ubuntu-latest
    needs: build
    # Só roda em push direto no main (não em PRs) para economizar minutos
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.2 }
      - uses: actions/setup-node@v4
        with: { node-version: "20.x", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test e2e/student-journey.spec.ts --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: https://will-treinos-pro.vercel.app
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          NEXT_PUBLIC_DEV_ROOT_EMAILS: ${{ secrets.NEXT_PUBLIC_DEV_ROOT_EMAILS }}
          NEXT_PUBLIC_APP_URL: https://will-treinos-pro.vercel.app
          NEXT_PUBLIC_POSTHOG_HOST: https://us.posthog.com
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rls-audit:
    name: RLS Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ankane/setup-postgres@v1
        with: { postgres-version: 15 }
      - run: psql postgres://postgres:postgres@localhost/postgres -f supabase/rls-audit.sql 2>&1 | tee rls-audit.log
        continue-on-error: true
      - run: |
          if grep -q "FAILED" rls-audit.log 2>/dev/null; then
            echo "⚠️ RLS issues encontrados — revisar antes de deploy"
            cat rls-audit.log; exit 1
          else
            echo "✅ RLS OK"; cat rls-audit.log
          fi

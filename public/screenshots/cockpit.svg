  <text x="333" y="407" text-anchor="middle" font-family="Inter, Arial" font-size="11" font-weight="600" fill="#EAB308">Check-in</text>

  <!-- Lesson card 2 -->
  <rect x="12" y="460" width="366" height="70" rx="12" fill="#111111" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <rect x="12" y="460" width="4" height="70" rx="2" fill="#3b82f6" />
  <text x="28" y="484" font-family="Inter, Arial" font-size="13" font-weight="700" fill="#ffffff">Turma Iniciante</text>
  <text x="28" y="504" font-family="Inter, Arial" font-size="11" fill="#71717a">10:00 — 11:00 · 12 alunos · Quadra B</text>
  <rect x="300" y="472" width="66" height="24" rx="12" fill="#22c55e" opacity="0.15" />
  <text x="333" y="489" text-anchor="middle" font-family="Inter, Arial" font-size="11" font-weight="600" fill="#22c55e">Concluída</text>

  <!-- Pending approvals -->
  <rect x="12" y="548" width="366" height="56" rx="12" fill="#18130a" stroke="#EAB308" stroke-opacity="0.2" stroke-width="1" />
  <circle cx="36" cy="576" r="12" fill="#EAB308" opacity="0.15" />
  <text x="36" y="581" text-anchor="middle" font-family="Arial" font-size="13" fill="#EAB308">2</text>
  <text x="58" y="572" font-family="Inter, Arial" font-size="13" font-weight="600" fill="#ffffff">Aprovações Pendentes</text>
  <text x="58" y="589" font-family="Inter, Arial" font-size="11" fill="#71717a">2 novos alunos aguardando aprovação</text>
  <text x="362" y="581" text-anchor="end" font-family="Arial" font-size="16" fill="#EAB308">›</text>

  <!-- Bottom nav -->
  <rect x="0" y="756" width="390" height="88" fill="#050505" />
  <line x1="0" y1="756" x2="390" y2="756" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <!-- Nav items: 5 icons -->
  <!-- Cockpit (active) -->
  <rect x="27" y="766" width="52" height="52" rx="10" fill="#EAB308" opacity="0.1" />
  <rect x="44" y="778" width="18" height="14" rx="3" fill="none" stroke="#EAB308" stroke-width="2" />
  <line x1="48" y1="784" x2="58" y2="784" stroke="#EAB308" stroke-width="1.5" />
  <line x1="48" y1="789" x2="56" y2="789" stroke="#EAB308" stroke-width="1.5" />
  <text x="53" y="830" text-anchor="middle" font-family="Inter, Arial" font-size="9" font-weight="600" fill="#EAB308">Cockpit</text>
  <!-- Quadra -->
  <rect x="171" y="778" width="18" height="14" rx="2" fill="none" stroke="#52525b" stroke-width="1.5" />
  <text x="180" y="830" text-anchor="middle" font-family="Inter, Arial" font-size="9" fill="#52525b">Quadra</text>
  <!-- Alunos -->
  <circle cx="258" cy="785" r="5" fill="none" stroke="#52525b" stroke-width="1.5" />
  <text x="258" y="830" text-anchor="middle" font-family="Inter, Arial" font-size="9" fill="#52525b">Alunos</text>
  <!-- Feed -->
  <rect x="318" y="779" width="16" height="12" rx="2" fill="none" stroke="#52525b" stroke-width="1.5" />
  <text x="326" y="830" text-anchor="middle" font-family="Inter, Arial" font-size="9" fill="#52525b">Feed</text>
  <!-- Mais -->
  <text x="375" y="790" text-anchor="middle" font-family="Arial" font-size="18" fill="#52525b">⋯</text>
  <text x="375" y="830" text-anchor="middle" font-family="Inter, Arial" font-size="9" fill="#52525b">Mais</text>

  <!-- Home indicator -->
  <rect x="155" y="824" width="80" height="4" rx="2" fill="#ffffff" opacity="0.2" />
</svg>

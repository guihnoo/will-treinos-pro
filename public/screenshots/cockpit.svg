<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EAB308" />
      <stop offset="100%" stop-color="#F97316" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#000000" />

  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="44" fill="#000000" />
  <text x="20" y="28" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#ffffff">9:41</text>
  <!-- Battery/signal icons placeholder -->
  <rect x="340" y="18" width="28" height="12" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <rect x="342" y="20" width="18" height="8" rx="1" fill="#ffffff" />

  <!-- Header -->
  <rect x="0" y="44" width="390" height="72" fill="#050505" />
  <text x="20" y="78" font-family="Inter, Arial" font-size="11" font-weight="500" fill="#71717a">Sexta, 2 de maio</text>
  <text x="20" y="100" font-family="Inter, Arial" font-size="22" font-weight="800" fill="#ffffff">Cockpit </text>
  <text x="120" y="100" font-family="Inter, Arial" font-size="22" font-weight="800" fill="#EAB308">do Treinador</text>
  <!-- Avatar -->
  <circle cx="358" cy="80" r="22" fill="#1a1a1a" stroke="#EAB308" stroke-width="2" />
  <text x="358" y="86" text-anchor="middle" font-family="Arial" font-size="16" font-weight="700" fill="#EAB308">W</text>

  <!-- KPI Grid: 2x2 -->
  <!-- Card 1: Alunos Ativos -->
  <rect x="12" y="132" width="176" height="96" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1" />
  <text x="28" y="158" font-family="Inter, Arial" font-size="11" font-weight="500" fill="#71717a">Alunos Ativos</text>
  <text x="28" y="192" font-family="Inter, Arial" font-size="36" font-weight="800" fill="#ffffff">24</text>
  <rect x="28" y="202" width="60" height="3" rx="1.5" fill="#EAB308" opacity="0.4" />
  <text x="120" y="220" text-anchor="end" font-family="Inter, Arial" font-size="10" fill="#22c55e">+2 este mês</text>

  <!-- Card 2: Presença Hoje -->
  <rect x="202" y="132" width="176" height="96" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1" />
  <text x="218" y="158" font-family="Inter, Arial" font-size="11" font-weight="500" fill="#71717a">Presença Hoje</text>
  <text x="218" y="192" font-family="Inter, Arial" font-size="36" font-weight="800" fill="#EAB308">87%</text>
  <rect x="218" y="202" width="100" height="6" rx="3" fill="#27272a" />
  <rect x="218" y="202" width="87" height="6" rx="3" fill="#EAB308" />

  <!-- Card 3: Receita -->
  <rect x="12" y="240" width="176" height="96" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1" />
  <text x="28" y="266" font-family="Inter, Arial" font-size="11" font-weight="500" fill="#71717a">Receita Mensal</text>
  <text x="28" y="298" font-family="Inter, Arial" font-size="24" font-weight="800" fill="#ffffff">R$ 4.800</text>
  <text x="28" y="320" font-family="Inter, Arial" font-size="10" fill="#22c55e">↑ 12% vs mês ant.</text>

  <!-- Card 4: Avaliação -->
  <rect x="202" y="240" width="176" height="96" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1" />
  <text x="218" y="266" font-family="Inter, Arial" font-size="11" font-weight="500" fill="#71717a">Avaliação Média</text>
  <text x="218" y="298" font-family="Inter, Arial" font-size="36" font-weight="800" fill="#EAB308">4.8</text>
  <!-- Stars -->
  <text x="218" y="320" font-family="Arial" font-size="14" fill="#EAB308">★★★★★</text>

  <!-- Aulas de hoje -->

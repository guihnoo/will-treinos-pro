<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Will Treinos PRO — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #f4f4f5;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(92vw, 460px);
        border: 1px solid rgba(234, 179, 8, 0.35);
        border-radius: 20px;
        background: rgba(10, 10, 10, 0.92);
        padding: 24px;
        text-align: center;
        box-shadow: 0 0 40px rgba(234, 179, 8, 0.12);
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 12px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #eab308, #f97316);
        color: #000;
        font-weight: 900;
      }
      h1 {
        margin: 0;
        font-size: 20px;
      }
      p {
        color: #a1a1aa;
        font-size: 14px;
      }
      .gold {
        color: #eab308;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">WP</div>
      <h1>Will Treinos PRO</h1>
      <p class="gold">Você está offline.</p>
      <p>Suas ações serão sincronizadas quando a conexão voltar.</p>
    </main>
  </body>
  </html>

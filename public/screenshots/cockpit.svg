  <text x="340" y="366" text-anchor="end" font-family="Inter, Arial" font-size="12" fill="#EAB308">Ver todas</text>

  <!-- Lesson card 1 -->
  <rect x="12" y="378" width="366" height="70" rx="12" fill="#111111" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <rect x="12" y="378" width="4" height="70" rx="2" fill="#EAB308" />
  <text x="28" y="402" font-family="Inter, Arial" font-size="13" font-weight="700" fill="#ffffff">Turma Avançada</text>

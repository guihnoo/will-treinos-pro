<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Will Treinos PRO — Offline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #000;
        color: #f4f4f5;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      .card {
        width: min(92vw, 400px);
        border: 1px solid rgba(234, 179, 8, 0.2);
        border-radius: 20px;
        background: rgba(10, 10, 10, 0.95);
        padding: 32px 24px;
        text-align: center;
        box-shadow: 0 0 60px rgba(234, 179, 8, 0.08);
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #eab308, #f97316);
        color: #000;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -0.5px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.3px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(234, 179, 8, 0.1);
        border: 1px solid rgba(234, 179, 8, 0.25);
        border-radius: 100px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 600;
        color: #eab308;
        margin-bottom: 20px;
      }
      .badge::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #eab308;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      p {
        color: #71717a;
        font-size: 14px;
        line-height: 1.6;
        margin: 0 0 24px;
      }
      .hint {
        font-size: 12px;
        color: #3f3f46;
        margin: 0 0 24px;
      }
      button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, #eab308, #f97316);
        color: #000;
        border: none;
        border-radius: 12px;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.15s;
        width: 100%;
        justify-content: center;
      }
      button:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">WP</div>
      <h1>Will Treinos PRO</h1>
      <div class="badge">Sem conexão</div>
      <p>Você está offline. Algumas telas precisam de internet para carregar dados em tempo real.</p>
      <p class="hint">Verifique seu Wi-Fi ou dados móveis e tente novamente.</p>
      <button onclick="window.location.reload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        Tentar novamente
      </button>
    </main>
  </body>
</html>
